<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ห้องสมุดนิยาย</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@600;700&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5faf8;--s1:#ffffff;--s2:#edf6f2;--s3:#e0f0ea;--bd:#cce5db;--bd2:#b3d9cc;
  --mint:#2d9e7a;--mint2:#1a7a5e;--mdim:rgba(45,158,122,0.12);
  --text:#1a2e28;--dim:#5a7a70;--mute:#93b5aa;
  --raw:#7a5ea0;--raw2:#5e4480;--rdim:rgba(122,94,160,0.12);--rbd:#c4b3d9;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;font-weight:300;min-height:100%;padding-bottom:60px;}
a{color:inherit;text-decoration:none;}

/* STICKY HEADER */
.sticky-header{position:sticky;top:0;z-index:100;}

/* HEADER */
header{padding:24px 20px 14px;border-bottom:1px solid var(--bd);background:var(--s1);}
header h1{font-family:'Noto Serif Thai',serif;font-size:1.7rem;color:var(--mint2);font-weight:700;}
header p{margin-top:4px;font-size:.75rem;color:var(--dim);}

/* TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--s1);}
.nav-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:10px 18px;font-family:'Noto Sans Thai',sans-serif;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .15s;}
.nav-tab.active{color:var(--mint2);border-bottom-color:var(--mint);font-weight:500;}
.nav-tab[data-tab="raw"].active{color:var(--raw2);border-bottom-color:var(--raw);}

/* FILTERS */
.filters{padding:10px 16px;display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none;background:var(--s1);}
.filters::-webkit-scrollbar{display:none;}
.fb{background:transparent;border:1px solid var(--bd2);color:var(--dim);padding:4px 12px;border-radius:20px;font-family:'Noto Sans Thai',sans-serif;font-size:.74rem;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.fb.active{background:var(--mdim);border-color:var(--mint);color:var(--mint);}
.fb.raw-fb.active{background:var(--rdim);border-color:var(--raw);color:var(--raw);}
.clear-btn{background:transparent;border:1px solid #e0a0a0;color:#b85c5c;padding:4px 10px;border-radius:20px;font-family:'Noto Sans Thai',sans-serif;font-size:.74rem;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.clear-btn:hover{background:rgba(184,92,92,.08);}

/* SEARCH */
.search-bar{padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--s1);}
.search-bar input{background:var(--bg);border:1px solid var(--bd2);color:var(--text);padding:8px 12px;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:.84rem;width:100%;outline:none;}
.search-bar input:focus{border-color:var(--mint);}
.search-bar input::placeholder{color:var(--mute);}
.count{padding:8px 16px;font-size:.74rem;color:var(--mute);border-bottom:1px solid var(--bd);background:var(--s1);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--mute);}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--mint);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{padding:40px 20px;text-align:center;color:#b85c5c;font-size:.85rem;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);}
@media(min-width:480px){.grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:700px){.grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:960px){.grid{grid-template-columns:repeat(6,1fr);}}
.card{background:var(--s1);cursor:pointer;position:relative;transition:background .15s;}
.card.hidden{display:none;}
.cover{width:100%;aspect-ratio:2/3;background:var(--s3);overflow:hidden;}
.cover img{width:100%;height:100%;object-fit:cover;display:block;}
.nc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:2rem;}
.card-body{padding:7px 9px 11px;display:flex;flex-direction:column;gap:4px;}
.title{font-family:'Noto Serif Thai',serif;font-weight:600;font-size:.85rem;line-height:1.5;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tag{font-size:.68rem;padding:2px 6px;border-radius:3px;border:1px solid var(--bd2);color:var(--dim);}
.src-badge{position:absolute;top:5px;left:5px;font-size:.6rem;padding:2px 5px;border-radius:3px;font-weight:500;letter-spacing:.3px;}
.src-badge.meb{background:rgba(45,158,122,.85);color:#fff;}
.src-badge.raw{background:rgba(122,94,160,.85);color:#fff;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--s1);border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:22px 18px 36px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.m-top{display:flex;gap:12px;margin-bottom:14px;}
.m-cover{width:100px;aspect-ratio:2/3;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--s3);}
.m-cover img{width:100%;height:100%;object-fit:cover;}
.m-nc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:1.8rem;}
.m-info{flex:1;display:flex;flex-direction:column;gap:7px;}
.m-title{font-family:'Noto Serif Thai',serif;font-weight:700;font-size:1rem;line-height:1.5;color:var(--text);}
.m-src{display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:4px;font-weight:500;}
.m-src.meb{background:rgba(45,158,122,.15);color:var(--mint2);border:1px solid rgba(45,158,122,.3);}
.m-src.raw{background:rgba(122,94,160,.15);color:var(--raw2);border:1px solid rgba(122,94,160,.3);}
.m-tags{display:flex;flex-wrap:wrap;gap:4px;}
.m-tag{font-size:.72rem;padding:3px 8px;border-radius:4px;border:1px solid var(--bd2);color:var(--dim);}
.m-summary{font-size:.81rem;line-height:1.8;color:var(--dim);}
.m-link{display:inline-block;margin-top:10px;font-size:.79rem;color:var(--mint2);border:1px solid var(--bd2);padding:6px 14px;border-radius:8px;}
.m-link.raw-link{color:var(--raw2);border-color:var(--rbd);}
.m-close{position:absolute;top:13px;right:14px;background:transparent;border:none;font-size:1.25rem;color:var(--mute);cursor:pointer;padding:4px;}

/* EMPTY */
.empty{padding:50px 20px;text-align:center;color:var(--mute);font-size:.85rem;}

/* GO-TO-TOP BUTTON */
.go-top{position:fixed;bottom:24px;right:20px;width:44px;height:44px;background:var(--mint);color:#fff;border:none;border-radius:50%;font-size:1.25rem;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:150;box-shadow:0 3px 14px rgba(45,158,122,0.45);transition:opacity .2s,transform .2s;}
.go-top.visible{display:flex;}
.go-top:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<div class="sticky-header">
  <header>
    <div>
      <h1>ห้องสมุดนิยาย 📚</h1>
      <p id="header-count">กำลังโหลด...</p>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="meb" onclick="switchTab('meb')">MEB Market</button>
    <button class="nav-tab" data-tab="raw" onclick="switchTab('raw')">RAW</button>
  </div>

  <div id="filter-bar" class="filters"></div>
  <div class="search-bar"><input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." oninput="filterBooks()"></div>
  <div class="count" id="count-bar"></div>
</div>

<div id="main-content">
  <div class="loading"><div class="spinner"></div><span>กำลังโหลดข้อมูล...</span></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="m-close" onclick="closeModalBtn()">✕</button>
    <div class="m-top">
      <div class="m-cover" id="m-cover"><div class="m-nc">📖</div></div>
      <div class="m-info">
        <div class="m-title" id="m-title"></div>
        <span class="m-src" id="m-src"></span>
        <div class="m-tags" id="m-tags"></div>
      </div>
    </div>
    <div class="m-summary" id="m-summary"></div>
    <a class="m-link" id="m-link" href="#" target="_blank" rel="noopener">อ่านนิยาย →</a>
  </div>
</div>

<!-- GO-TO-TOP -->
<button class="go-top" id="go-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZ7ehvseyk0sGxEcJ9uxC3F5Oo8Vm-98mZmEfJ-kr7Ph-n4mgr-qzx-1--nD0TVh9eWafrEpfJWU0k/pub?gid=1147646991&single=true&output=csv';

let allBooks = [];
let currentTab = 'meb';
let activeTags = new Set();
let searchQ = '';

/* ===== CSV PARSER ===== */
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = splitCSVLine(line);
    if (cols.length < 5) continue;
    rows.push({
      title:   (cols[0] || '').trim(),
      summary: (cols[1] || '').trim(),
      url:     (cols[2] || '').trim(),
      tags:    (cols[3] || '').split('|').map(t => t.trim()).filter(Boolean),
      source:  (cols[4] || '').trim(),
      cover:   (cols[5] || '').trim(),
    });
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

/* ===== LOAD ===== */
async function loadData() {
  try {
    const res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allBooks = parseCSV(text);
    renderAll();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">โหลดข้อมูลไม่ได้ 😢<br><small>${e.message}</small><br><br><button onclick="loadData()" style="padding:8px 16px;border:1px solid var(--bd2);border-radius:8px;background:var(--s1);cursor:pointer;font-family:inherit;">ลองใหม่</button></div>`;
  }
}

/* ===== RENDER ===== */
function renderAll() {
  updateHeaderCount();
  buildFilterBar();
  renderGrid();
}

function updateHeaderCount() {
  const meb = allBooks.filter(b => b.source === 'meb').length;
  const raw = allBooks.filter(b => b.source === 'raw').length;
  document.getElementById('header-count').textContent = `${meb + raw} เรื่อง · MEB ${meb} · RAW ${raw}`;
}

function buildFilterBar() {
  const books = allBooks.filter(b => b.source === currentTab);
  const tags = [...new Set(books.flatMap(b => b.tags))].sort((a,b) => a.localeCompare(b, 'th'));
  const isRaw = currentTab === 'raw';
  const noneSelected = activeTags.size === 0 && searchQ.trim().length === 0;

  const firstBtn = noneSelected
    ? `<button class="fb${isRaw ? ' raw-fb' : ''} active" onclick="clearTags()">ทั้งหมด</button>`
    : `<button class="clear-btn" onclick="clearTags()">✕ ล้าง</button>`;

  const tagBtns = tags.map(t =>
    `<button class="fb${isRaw ? ' raw-fb' : ''}${activeTags.has(t) ? ' active' : ''}" onclick="setTag('${t.replace(/'/g,"\\'")}')">
      ${esc(t)}
    </button>`
  ).join('');

  document.getElementById('filter-bar').innerHTML = firstBtn + tagBtns;
}

function renderGrid() {
  const crossTab = searchQ.trim().length > 0 && activeTags.size === 0;
  const pool = crossTab ? allBooks : allBooks.filter(b => b.source === currentTab);

  const filtered = pool.filter(b => {
    const tagOk = activeTags.size === 0 || [...activeTags].every(t => b.tags.includes(t));
    const q = searchQ.toLowerCase().trim();
    const searchOk = !q || b.title.toLowerCase().includes(q);
    return tagOk && searchOk;
  });

  if (crossTab) {
    const mebCount = filtered.filter(b => b.source === 'meb').length;
    const rawCount = filtered.filter(b => b.source === 'raw').length;
    document.getElementById('count-bar').textContent = `ค้นหาพบ ${filtered.length} เรื่อง · MEB ${mebCount} · RAW ${rawCount}`;
  } else {
    const total = allBooks.filter(b => b.source === currentTab).length;
    document.getElementById('count-bar').textContent = `แสดง ${filtered.length} จาก ${total} เรื่อง`;
  }

  if (!filtered.length) {
    document.getElementById('main-content').innerHTML = '<div class="empty">ไม่พบนิยายที่ตรงกัน</div>';
    return;
  }

  const html = `<div class="grid">${filtered.map(b => buildCard(b, allBooks.indexOf(b))).join('')}</div>`;
  document.getElementById('main-content').innerHTML = html;
}

function buildCard(b, idx) {
  const coverHtml = b.cover
    ? `<img src="${esc(fixCoverUrl(b.cover))}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const ncStyle = b.cover ? 'display:none' : '';
  const tagHtml = b.tags.slice(0,3).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  return `<div class="card" onclick="openModal(${idx})">
    <div class="cover">${coverHtml}<div class="nc" style="${ncStyle}">📖</div></div>
    <span class="src-badge ${b.source}">${b.source === 'meb' ? 'MEB' : 'RAW'}</span>
    <div class="card-body">
      <div class="title">${esc(b.title)}</div>
      <div class="tags">${tagHtml}</div>
    </div>
  </div>`;
}

function fixCoverUrl(url) {
  if (!url) return "";
  // Convert any Google Drive URL to direct image URL (avoids CORS/hotlink block)
  const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return "https://lh3.googleusercontent.com/d/" + m[1];
  return url;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===== TABS / FILTER / SEARCH ===== */
function switchTab(tab) {
  currentTab = tab;
  activeTags = new Set();
  searchQ = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  buildFilterBar();
  renderGrid();
}

function setTag(tag) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
  } else {
    activeTags.add(tag);
  }
  buildFilterBar();
  renderGrid();
}

function clearTags() {
  activeTags = new Set();
  searchQ = '';
  document.getElementById('search-input').value = '';
  buildFilterBar();
  renderGrid();
}

function filterBooks() {
  searchQ = document.getElementById('search-input').value;
  renderGrid();
}

/* ===== MODAL ===== */
function openModal(idx) {
  const b = allBooks[idx];
  document.getElementById('m-title').textContent = b.title;
  const srcEl = document.getElementById('m-src');
  srcEl.textContent = b.source === 'meb' ? 'MEB Market' : 'RAW';
  srcEl.className = 'm-src ' + b.source;
  document.getElementById('m-tags').innerHTML = b.tags.map(t => `<span class="m-tag">${esc(t)}</span>`).join('');
  document.getElementById('m-summary').textContent = b.summary;
  const link = document.getElementById('m-link');
  link.href = b.url || '#';
  link.className = 'm-link' + (b.source === 'raw' ? ' raw-link' : '');
  link.style.display = b.url ? 'inline-block' : 'none';
  const cover = document.getElementById('m-cover');
  if (b.cover) {
    cover.innerHTML = `<img src="${esc(fixCoverUrl(b.cover))}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'m-nc\\'>📖</div>'">`;
  } else {
    cover.innerHTML = '<div class="m-nc">📖</div>';
  }
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modal-bg')) closeModalBtn(); }
function closeModalBtn() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

/* ===== SCROLL / GO-TOP ===== */
window.addEventListener('scroll', () => {
  document.getElementById('go-top').classList.toggle('visible', window.scrollY > 300);
}, {passive: true});

/* ===== INIT ===== */
loadData();
</script>
</body>
</html>
